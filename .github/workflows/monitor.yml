name: 财联社电报监控

# 该工作流通过 workflow_dispatch 触发（由 cron-job.org 每 3 分钟调用一次）
on:
  workflow_dispatch:
    inputs:
      reason:
        description: '触发原因'
        required: false
        default: 'cron-job.org 定时触发'

# 同一时间只允许一个实例运行，避免重复通知
concurrency:
  group: cls-monitor
  cancel-in-progress: false

# 允许工作流推送状态文件回仓库
permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # 1. 检出代码（含 data/last_state.json 状态文件）
      - name: 检出仓库代码
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. 运行监控脚本（会读取并更新 data/last_state.json）
      - name: 运行财联社电报监控
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          STATE_FILE: data/last_state.json
        run: python monitor.py

      # 4. 将更新后的状态文件提交回仓库（下次运行会检出最新状态）
      - name: 提交状态文件
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/last_state.json
          if git diff --staged --quiet; then
            echo "状态文件无变化，跳过提交"
          else
            git commit -m "chore: 更新监控状态"
            git push
            echo "✓ 状态文件已提交并推送"
          fi
